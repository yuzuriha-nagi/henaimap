<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お気に入り</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            margin-bottom: 40px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--text-color);
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 15px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background-color: #000;
        }
        .game-card .card-img {
            aspect-ratio: 460 / 215;
        }
        .card-content {
            padding: 12px;
            text-align: center;
        }
        .card-title {
            font-weight: bold;
            font-size: 1rem;
            margin: 0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.6;
        }
        .close-btn:hover { opacity: 1; }
        .song-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .song-item {
            margin: 15px 0;
        }
        .song-link {
            display: block;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: bold;
            border: 1px solid transparent;
        }
        .song-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        footer {
            margin-top: 50px;
            opacity: 0.6;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>お気に入り</h1>
    </header>

    <div class="container">
        <!-- ゲーム -->
        <div class="section-title">ゲーム</div>
        <div class="grid">
            <div class="card game-card">
                <img src="https://images.weserv.nl/?url=shared.fastly.steamstatic.com/store_item_assets/steam/apps/1973530/header.jpg" class="card-img" alt="Limbus Company">
                <div class="card-content">
                    <p class="card-title">Limbus Company</p>
                </div>
            </div>
            <div class="card game-card">
                <img src="https://images.weserv.nl/?url=shared.fastly.steamstatic.com/store_item_assets/steam/apps/568220/header.jpg" class="card-img" alt="Lobotomy Corporation">
                <div class="card-content">
                    <p class="card-title">Lobotomy Corporation</p>
                </div>
            </div>
            <div class="card game-card">
                <img src="https://images.weserv.nl/?url=shared.fastly.steamstatic.com/store_item_assets/steam/apps/1256670/header.jpg" class="card-img" alt="Library of Ruina">
                <div class="card-content">
                    <p class="card-title">Library of Ruina</p>
                </div>
            </div>
            <div class="card game-card">
                <img src="https://images.weserv.nl/?url=shared.fastly.steamstatic.com/store_item_assets/steam/apps/438100/header.jpg" class="card-img" alt="VRChat">
                <div class="card-content">
                    <p class="card-title">VRChat</p>
                </div>
            </div>
            <div class="card game-card">
                <img src="https://images.weserv.nl/?url=shared.fastly.steamstatic.com/store_item_assets/steam/apps/1364780/header.jpg" class="card-img" alt="Street Fighter 6">
                <div class="card-content">
                    <p class="card-title">Street Fighter 6</p>
                </div>
            </div>
        </div>

        <!-- キャラクター -->
        <div class="section-title">キャラクター</div>
        <div class="grid">
            <div class="card">
                <img src="https://images.weserv.nl/?url=static.wikia.nocookie.net/library-of-ruina/images/1/1a/Yan_Messenger.png" class="card-img" alt="ヤン">
                <div class="card-content">
                    <p class="card-title">ヤン</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.weserv.nl/?url=static.wikia.nocookie.net/library-of-ruina/images/4/4a/Netzach_LoR.png" class="card-img" alt="ネツァク">
                <div class="card-content">
                    <p class="card-title">ネツァク</p>
                </div>
            </div>
        </div>

        <!-- 音楽 -->
        <div class="section-title">音楽</div>
        <div class="grid">
            <div class="card" onclick="showSongs([
                {name: '終点の先があるとするならば', url: 'https://www.youtube.com/watch?v=vcw5THyM7Jo'},
                {name: '風薫る空の下', url: 'https://www.youtube.com/watch?v=vcw5THyM7Jo'},
                {name: '傷つけど愛してる', url: 'https://www.youtube.com/watch?v=iGIqREB16l4'}
            ])">
                <img src="https://images.weserv.nl/?url=yt3.googleusercontent.com/WxwAUNuEUtkY_WT52xwfWw_dP9cHmZbuVer2QeOxKuvQdiBiFFY7hmFhgy-i6XYn-CCRYuB6=s900-c-k-c0x00ffffff-no-rj" class="card-img" alt="ツユ">
                <div class="card-content">
                    <p class="card-title">ツユ</p>
                </div>
            </div>
            <div class="card" onclick="showSongs([
                {name: 'caffeine', url: 'https://www.youtube.com/watch?v=p468sN0_X8g'},
                {name: '表情差分', url: 'https://www.youtube.com/watch?v=lB3mij3gmVo'},
                {name: 'Void', url: 'https://www.youtube.com/watch?v=vVfFwFvH3A0'}
            ])">
                <img src="https://images.weserv.nl/?url=alltstudio.jp/wp/wp-content/uploads/2024/06/DUSTCELL_MainAP_suquare-1920.jpg" class="card-img" alt="DUSTCELL">
                <div class="card-content">
                    <p class="card-title">DUSTCELL</p>
                </div>
            </div>
            <div class="card" onclick="showSongs([
                {name: 'Children of the city', url: 'https://www.youtube.com/watch?v=uK1X_3v_mCg'},
                {name: 'Gone angels', url: 'https://www.youtube.com/watch?v=qh7CFsnfdpk'},
                {name: 'world.execute(me)', url: 'https://www.youtube.com/watch?v=ESx_hy1n7HA'}
            ])">
                <img src="https://images.weserv.nl/?url=images.squarespace-cdn.com/content/v1/52143a7ae4b0f9bd8308dc73/467220c7-6c9f-46fd-b659-f75020ab4aea/mili_group_fix.jpg" class="card-img" alt="Mili">
                <div class="card-content">
                    <p class="card-title">Mili</p>
                </div>
            </div>
            <div class="card" onclick="showSongs([
                {name: '暗く黒く', url: 'https://www.youtube.com/watch?v=dcU25y_JW_w'},
                {name: 'お勉強しといてよ', url: 'https://www.youtube.com/watch?v=Atvsg_zogxo'},
                {name: '秒針を噛む', url: 'https://www.youtube.com/watch?v=GJI4Gv7N8as'}
            ])">
                <img src="https://yt3.googleusercontent.com/ytc/AIdro_k65c3FqRpwfe066estQZsGjy_sBu1Y0sV_6_C23VXUlho=s900-c-k-c0x00ffffff-no-rj" class="card-img" alt="ずっと真夜中でいいのに。">
                <div class="card-content">
                    <p class="card-title">ずっと真夜中でいいのに。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="songModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <ul id="songList" class="song-list"></ul>
        </div>
    </div>

    <script>
        function showSongs(songs) {
            const modal = document.getElementById('songModal');
            const list = document.getElementById('songList');
            
            list.innerHTML = '';
            
            songs.forEach(song => {
                const li = document.createElement('li');
                li.className = 'song-item';
                
                const a = document.createElement('a');
                a.href = song.url;
                a.target = '_blank';
                a.className = 'song-link';
                a.innerText = song.name;
                
                li.appendChild(a);
                list.appendChild(li);
            });
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('songModal').style.display = 'none';
        }
    </script>

    <footer>
        &copy; 2026 My Favorite Things
    </footer>
</body>
</html>
